
<html>
<head>
    <title>Highlight Bold Words</title>
    <style>
        a {
            color: rgb(255, 0, 98);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <p>
        <a onmouseover="highlightBold()" onmouseout="removeHighlight()">
            On mouse over here bold words of the following paragraph will be highlighted
        </a>
    </p>

    <p id="para">
        We have just started this section for the users 
        (<b>beginner</b> to <b>intermediate</b>) who want to 
        <b>work</b> with various <b>JavaScript</b> problems and 
        <b>write</b> scripts online to test their <b>JavaScript</b> skill.
    </p>

    <script>
        function highlightBold() {
            var boldWords = document.getElementsByTagName("b");
            for (var i = 0; i < boldWords.length; i++) {
                boldWords[i].style.backgroundColor = "yellow";
            }
        }

        function removeHighlight() {
            var boldWords = document.getElementsByTagName("b");
            for (var i = 0; i < boldWords.length; i++) {
                boldWords[i].style.backgroundColor = "transparent";
            }
        }
    </script>

</body>
</html>
