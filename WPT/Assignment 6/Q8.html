<!DOCTYPE html>
<html>
<head>
  <title>Shopping Cart Total</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .result { color: blue; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Shopping Cart</h2>
  <ul id="cartItems"></ul>
  <p>Total Price: <span id="total" class="result"></span></p>

  <script>
    // Example shopping cart array
    const cart = [
      { name: "Shoes", price: 1200, quantity: 1 },
      { name: "T-shirt", price: 800, quantity: 2 },
      { name: "Jeans", price: 1500, quantity: 1 }
    ];

    // Display items
    const cartList = document.getElementById("cartItems");
    cart.forEach(item => {
      const li = document.createElement("li");
      li.textContent = `${item.name} - ₹${item.price} × ${item.quantity}`;
      cartList.appendChild(li);
    });

    // Use reduce to calculate total
    const totalPrice = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);

    // Display total
    document.getElementById("total").textContent = "₹" + totalPrice;
  </script>
</body>
</html>
