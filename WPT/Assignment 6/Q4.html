<!DOCTYPE html>
<html>
<head>
    <title>Object Destructuring Example</title>
</head>
<body>

    <h2>Car Details</h2>
    <button onclick="showCarDetails()">Show Car Info</button>

    <p id="output"></p>

    <script>
        function showCarDetails() {
            // Car object
            const car = {
                brand: "Toyota",
                model: "Camry",
                year: 2022,
                price: 3000000
            };

            // Object destructuring
            const { brand, model, year, price } = car;

            // Display output
            document.getElementById("output").innerHTML =
                "Brand: " + brand + "<br>" +
                "Model: " + model + "<br>" +
                "Year: " + year + "<br>" +
                "Price: ₹" + price;
        }
    </script>

</body>
</html>
