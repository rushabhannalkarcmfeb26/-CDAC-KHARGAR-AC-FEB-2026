<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Sign In</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background gradient similar to your image */
            background: linear-gradient(135deg, #e0f2f1 0%, #006064 100%);
        }

        .container {
            display: flex;
            width: 800px;
            height: 500px;
            background: white;
            border-radius: 50px; /* Large rounded corners from image */
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Left Side - Sign In */
        .left-side {
            flex: 1.2;
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .left-side h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .social-icons {
            margin-bottom: 20px;
        }

        .social-icons span {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 50%;
            margin: 0 5px;
            line-height: 40px;
            color: #555;
            cursor: pointer;
        }

        .input-group {
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            outline: none;
        }

        .forgot-pass {
            font-size: 0.8rem;
            color: #777;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .btn-signin {
            background: #008CBA;
            color: white;
            padding: 12px 50px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Right Side - Create Account */
        .right-side {
            flex: 1;
            background: #1DA1F2; /* Blue color from image */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .right-side h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .right-side p {
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-signup {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 40px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-signup:hover {
            background: white;
            color: #1DA1F2;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-side">
            <h1>Sign in</h1>
            <div class="social-icons">
                <span>G</span> <span>f</span> <span>in</span>
            </div>
            <p style="font-size: 0.8rem; color: #999;">Or sign in using E-Mail Address</p>
            
            <div class="input-group">
                <input type="email" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password">
            </div>
            
            <a href="#" class="forgot-pass">Forgot your password?</a>
            
            <button class="btn-signin">SIGN IN</button>
        </div>

        <div class="right-side">
            <h2>Create, Account!</h2>
            <p>Sign up if you still don't have an account...</p>
            <button class="btn-signup">SIGN UP</button>
        </div>
    </div>

</body>
</html>
