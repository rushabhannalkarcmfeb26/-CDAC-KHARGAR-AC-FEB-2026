<!DOCTYPE html>
<html>
<head>
  <title>Sum Using Rest Operator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .result { color: purple; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Sum of Arguments</h2>
  <p>Numbers: 5, 10, 15, 20</p>
  <p>Sum: <span id="sum" class="result"></span></p>

  <script>
    // Function using rest operator
    function sumAll(...numbers) {
      return numbers.reduce((acc, num) => acc + num, 0);
    }

    // Example usage
    const total = sumAll(5, 10, 15, 20);

    // Display result
    document.getElementById("sum").textContent = total;
  </script>
</body>
</html>
